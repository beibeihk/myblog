name: Deploy Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Hexo site
        run: npm run clean && npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

      - name: Upload public artifact for CloudBase
        uses: actions/upload-artifact@v4
        with:
          name: public-site
          path: ./public

  deploy-github-pages:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudbase:
    needs: build
    runs-on: ubuntu-latest
    env:
      TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
      TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
      TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}

    steps:
      - name: Skip when CloudBase secrets are not configured
        if: ${{ env.TCB_SECRET_ID == '' || env.TCB_SECRET_KEY == '' || env.TCB_ENV_ID == '' }}
        run: echo "CloudBase secrets are not configured. Skipping CloudBase deployment."

      - name: Download public artifact
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: ./public

      - name: Setup Node.js
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CloudBase CLI
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        run: npm install -g @cloudbase/cli

      - name: Login CloudBase CLI
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        run: tcb login --apiKeyId ${{ env.TCB_SECRET_ID }} --apiKey ${{ env.TCB_SECRET_KEY }}

      - name: Deploy to CloudBase hosting
        if: ${{ env.TCB_SECRET_ID != '' && env.TCB_SECRET_KEY != '' && env.TCB_ENV_ID != '' }}
        run: tcb hosting deploy ./public /myblog -e ${{ env.TCB_ENV_ID }}
